<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Harmonizer | Premium Breathing</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0f111a',
                        accent: '#2dd4bf' // Teal-400
                    },
                    fontFamily: {
                        sans: ['"Outfit"', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif'],
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #0f111a;
            color: #f8fafc;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f111a 70%);
            min-height: 100vh;
        }

        /* Glassmorphism Panels */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* Smooth Breathing Animations */
        .hero-circle {
            transition-property: transform, background-color, box-shadow;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform, background-color, box-shadow;
        }
        
        .pulse-ring {
            transition-property: transform, opacity, border-color;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform, opacity;
        }

        /* Idle State Gentle Pulse */
        @keyframes breatheIdle {
            0% { transform: scale(0.6); box-shadow: 0 0 30px rgba(45, 212, 191, 0.1); opacity: 0.5; }
            50% { transform: scale(0.65); box-shadow: 0 0 50px rgba(45, 212, 191, 0.2); opacity: 0.8; }
            100% { transform: scale(0.6); box-shadow: 0 0 30px rgba(45, 212, 191, 0.1); opacity: 0.5; }
        }
        .idle-pulse {
            animation: breatheIdle 8s ease-in-out infinite;
            background-color: rgba(45, 212, 191, 0.15);
            border: 1px solid rgba(45, 212, 191, 0.3);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
        
        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #2dd4bf;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(45,212,191,0.5);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const PRESETS = {
            '4-4': { inhale: 4, holdIn: 4, exhale: 4, holdOut: 4, label: 'Box' },
            '4-7-8': { inhale: 4, holdIn: 7, exhale: 8, holdOut: 0, label: 'Relax' },
            '4-4-6': { inhale: 4, holdIn: 4, exhale: 6, holdOut: 0, label: 'Calm' },
            '5-5-5-5': { inhale: 5, holdIn: 5, exhale: 5, holdOut: 5, label: 'Deep Box' },
            'custom': { inhale: 4, holdIn: 2, exhale: 4, holdOut: 2, label: 'Custom' }
        };

        const DURATIONS = [
            { label: '3 min', val: 180 },
            { label: '5 min', val: 300 },
            { label: '10 min', val: 600 },
            { label: '∞', val: 0 }
        ];

        const PHASE_CONFIG = {
            inhale:  { color: 'rgba(56, 189, 248, 0.85)', shadow: 'rgba(56, 189, 248, 0.4)', label: 'Inhale', scale: 1.0, ringScale: 1.15, ringOpacity: 0.8 },
            holdIn:  { color: 'rgba(167, 139, 250, 0.85)', shadow: 'rgba(167, 139, 250, 0.4)', label: 'Hold',   scale: 1.0, ringScale: 1.05, ringOpacity: 0.4 },
            exhale:  { color: 'rgba(45, 212, 191, 0.85)',  shadow: 'rgba(45, 212, 191, 0.4)',  label: 'Exhale', scale: 0.4, ringScale: 0.5,  ringOpacity: 0.2 },
            holdOut: { color: 'rgba(251, 191, 36, 0.85)',  shadow: 'rgba(251, 191, 36, 0.4)',  label: 'Hold',   scale: 0.4, ringScale: 0.45, ringOpacity: 0.1 }
        };

        const AlphaHarmonizer = () => {
            const [selectedPreset, setSelectedPreset] = useState('4-4');
            const [customRatio, setCustomRatio] = useState(PRESETS['custom']);
            const [duration, setDuration] = useState(300);
            
            const [isRunning, setIsRunning] = useState(false);
            const [isFinished, setIsFinished] = useState(false);
            const [sessionStats, setSessionStats] = useState({ cycles: 0, minutes: 0 });
            
            const [currentPhase, setCurrentPhase] = useState('inhale');
            const [phaseTimeLeft, setPhaseTimeLeft] = useState(0);
            const [sessionTimeLeft, setSessionTimeLeft] = useState(300);
            const [cyclesCompleted, setCyclesCompleted] = useState(0);
            
            const [soundEnabled, setSoundEnabled] = useState(true);
            const [cueVolume, setCueVolume] = useState(80);
            const [ambientVolume, setAmbientVolume] = useState(50);

            const startTimeRef = useRef(0);
            const currentPhaseRef = useRef('inhale');
            const reqAnimFrameRef = useRef(null);
            const audioUnlocked = useRef(false);
            
            const ambientAudioRef = useRef(null);
            const cueAudioRef = useRef(null);

            const activeRatio = selectedPreset === 'custom' ? customRatio : PRESETS[selectedPreset];
            const cycleDuration = activeRatio.inhale + activeRatio.holdIn + activeRatio.exhale + activeRatio.holdOut;

            // Initialize Audio - PATHS FIXED HERE!
            useEffect(() => {
                ambientAudioRef.current = new Audio('freesound_community-binaural-beats_delta_440_440-5hz-48565.mp3');
                ambientAudioRef.current.loop = true;
                
                cueAudioRef.current = new Audio('freesound_community-metronome-85688.mp3');

                return () => {
                    ambientAudioRef.current?.pause();
                    cueAudioRef.current?.pause();
                    cancelAnimationFrame(reqAnimFrameRef.current);
                };
            }, []);

            useEffect(() => {
                if (ambientAudioRef.current) ambientAudioRef.current.volume = soundEnabled ? (ambientVolume / 100) : 0;
                if (cueAudioRef.current) cueAudioRef.current.volume = soundEnabled ? (cueVolume / 100) : 0;
            }, [ambientVolume, cueVolume, soundEnabled]);

            const unlockAudio = () => {
                if (!audioUnlocked.current) {
                    const playPromiseAmb = ambientAudioRef.current?.play();
                    if (playPromiseAmb !== undefined) {
                        playPromiseAmb.then(() => {
                            if (!isRunning) ambientAudioRef.current.pause();
                        }).catch(e => console.log("Ambient autoplay blocked:", e));
                    }
                    
                    const playPromiseCue = cueAudioRef.current?.play();
                    if (playPromiseCue !== undefined) {
                        playPromiseCue.then(() => {
                            cueAudioRef.current.pause();
                            cueAudioRef.current.currentTime = 0;
                        }).catch(e => console.log("Cue autoplay blocked:", e));
                    }
                    audioUnlocked.current = true;
                }
            };

            const triggerPhaseChange = (newPhase) => {
                setCurrentPhase(newPhase);
                currentPhaseRef.current = newPhase;
                
                if (soundEnabled && cueAudioRef.current && activeRatio[newPhase] > 0) {
                    cueAudioRef.current.currentTime = 0;
                    cueAudioRef.current.play().catch(()=>{});
                }
                
                if (navigator.vibrate && activeRatio[newPhase] > 0) {
                    navigator.vibrate(40);
                }
            };

            const finishSession = () => {
                setIsRunning(false);
                ambientAudioRef.current?.pause();
                setSessionStats({
                    cycles: cyclesCompleted,
                    minutes: duration > 0 ? (duration / 60).toFixed(1) : ((Date.now() - startTimeRef.current) / 60000).toFixed(1)
                });
                setIsFinished(true);
            };

            const loop = useCallback(() => {
                if (!isRunning) return;

                const now = Date.now();
                const elapsedTotal = now - startTimeRef.current;
                const elapsedSeconds = elapsedTotal / 1000;
                
                if (duration > 0 && elapsedSeconds >= duration) {
                    finishSession();
                    return;
                }

                const currentCycleSeconds = elapsedSeconds % cycleDuration;
                const completed = Math.floor(elapsedSeconds / cycleDuration);
                
                if (completed !== cyclesCompleted) setCyclesCompleted(completed);
                if (duration > 0) setSessionTimeLeft(Math.max(0, Math.ceil(duration - elapsedSeconds)));

                let phaseAcc = 0;
                let activePhase = 'inhale';
                let timeLeftInPhase = 0;

                const phases = ['inhale', 'holdIn', 'exhale', 'holdOut'];
                for (let i = 0; i < phases.length; i++) {
                    const p = phases[i];
                    if (currentCycleSeconds < phaseAcc + activeRatio[p]) {
                        activePhase = p;
                        timeLeftInPhase = (phaseAcc + activeRatio[p]) - currentCycleSeconds;
                        break;
                    }
                    phaseAcc += activeRatio[p];
                }

                setPhaseTimeLeft(Math.ceil(timeLeftInPhase));

                if (activePhase !== currentPhaseRef.current) {
                    triggerPhaseChange(activePhase);
                }

                reqAnimFrameRef.current = requestAnimationFrame(loop);
            }, [isRunning, cycleDuration, activeRatio, duration, cyclesCompleted]);

            useEffect(() => {
                if (isRunning) {
                    reqAnimFrameRef.current = requestAnimationFrame(loop);
                } else {
                    cancelAnimationFrame(reqAnimFrameRef.current);
                }
                return () => cancelAnimationFrame(reqAnimFrameRef.current);
            }, [isRunning, loop]);

            const toggleSession = () => {
                unlockAudio();
                if (!isRunning) {
                    if (isFinished) resetSession();
                    startTimeRef.current = Date.now() - (cyclesCompleted * cycleDuration * 1000) - ((cycleDuration - phaseTimeLeft) * 1000); 
                    if(cyclesCompleted === 0 && phaseTimeLeft === 0) {
                         startTimeRef.current = Date.now();
                         triggerPhaseChange('inhale');
                    }
                    setIsRunning(true);
                    if (soundEnabled) ambientAudioRef.current?.play().catch(()=>{});
                } else {
                    setIsRunning(false);
                    ambientAudioRef.current?.pause();
                }
            };

            const resetSession = () => {
                setIsRunning(false);
                setIsFinished(false);
                setCyclesCompleted(0);
                setSessionTimeLeft(duration);
                setCurrentPhase('inhale');
                currentPhaseRef.current = 'inhale';
                setPhaseTimeLeft(activeRatio.inhale);
                ambientAudioRef.current?.pause();
                if(ambientAudioRef.current) ambientAudioRef.current.currentTime = 0;
            };

            const formatTime = (secs) => {
                const m = Math.floor(secs / 60).toString().padStart(2, '0');
                const s = (secs % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            const progressPercent = duration > 0 ? Math.min(100, ((duration - sessionTimeLeft) / duration) * 100) : 100;
            const currentStyle = isRunning ? PHASE_CONFIG[currentPhase] : PHASE_CONFIG['inhale'];
            const transitionSecs = isRunning ? activeRatio[currentPhase] : 1;

            return (
                <div className="min-h-screen flex flex-col w-full max-w-5xl mx-auto px-4 sm:px-6 py-6 md:py-8 relative">
                    
                    {/* Header */}
                    <header className="text-center mb-6 md:mb-10">
                        <h1 className="font-serif text-3xl md:text-4xl text-transparent bg-clip-text bg-gradient-to-r from-teal-200 to-teal-400 tracking-wide mb-1">Alpha Harmonizer</h1>
                        <p className="text-gray-400 text-xs md:text-sm tracking-[0.2em] uppercase font-light">Premium Breath Metronome</p>
                    </header>

                    {isFinished && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center bg-dark/80 backdrop-blur-md transition-opacity duration-700">
                            <div className="glass-panel p-8 md:p-12 rounded-3xl text-center shadow-2xl mx-4 max-w-md w-full">
                                <h2 className="font-serif text-3xl text-accent mb-3">Session Complete</h2>
                                <p className="text-gray-300 text-base md:text-lg mb-8 font-light">
                                    You completed <span className="text-white font-medium">{sessionStats.cycles}</span> cycles in <span className="text-white font-medium">{sessionStats.minutes}</span> minutes.
                                </p>
                                <button onClick={resetSession} className="bg-accent/10 border border-accent/30 text-accent hover:bg-accent hover:text-white px-8 py-3 rounded-full transition-all duration-300 tracking-wide">
                                    Begin Anew
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Top Controls Grid */}
                    <div className="grid md:grid-cols-2 gap-4 md:gap-6 mb-8 md:mb-12 relative z-10">
                        
                        {/* Ratios Panel */}
                        <div className="glass-panel rounded-3xl p-5 md:p-6 flex flex-col justify-between">
                            <div>
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-[11px] uppercase text-gray-400 tracking-widest font-semibold">Breathing Ratio</h3>
                                    <span className="text-accent font-serif text-sm tracking-widest">
                                        {activeRatio.inhale}:{activeRatio.holdIn}:{activeRatio.exhale}:{activeRatio.holdOut}
                                    </span>
                                </div>
                                <div className="flex flex-wrap gap-2 mb-2">
                                    {Object.keys(PRESETS).map(key => (
                                        <button 
                                            key={key} 
                                            onClick={() => { setSelectedPreset(key); resetSession(); }}
                                            className={`px-3 md:px-4 py-1.5 md:py-2 rounded-full text-xs md:text-sm transition-all duration-300 ${selectedPreset === key ? 'bg-accent text-dark font-medium shadow-[0_0_15px_rgba(45,212,191,0.3)]' : 'bg-white/5 text-gray-300 hover:bg-white/10'}`}
                                        >
                                            {PRESETS[key].label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            
                            {selectedPreset === 'custom' && (
                                <div className="grid grid-cols-4 gap-2 mt-4 bg-black/20 p-3 rounded-2xl border border-white/5">
                                    {['inhale', 'holdIn', 'exhale', 'holdOut'].map((phase, i) => (
                                        <div key={phase} className="flex flex-col items-center">
                                            <label className="text-[9px] text-gray-500 uppercase mb-1 tracking-wider">{['In', 'Hold', 'Out', 'Hold'][i]}</label>
                                            <input 
                                                type="number" min="0" max="12" 
                                                value={customRatio[phase]}
                                                onChange={(e) => {
                                                    const val = Math.max(0, Math.min(12, parseInt(e.target.value) || 0));
                                                    setCustomRatio({...customRatio, [phase]: val});
                                                    resetSession();
                                                }}
                                                className="w-10 h-10 md:w-12 md:h-12 bg-white/5 border border-white/10 text-center rounded-xl text-white focus:outline-none focus:border-accent transition-colors"
                                            />
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Duration Panel */}
                        <div className="glass-panel rounded-3xl p-5 md:p-6 flex flex-col justify-between">
                            <div>
                                <h3 className="text-[11px] uppercase text-gray-400 tracking-widest font-semibold mb-4">Session Duration</h3>
                                <div className="flex flex-wrap gap-2">
                                    {DURATIONS.map(d => (
                                        <button 
                                            key={d.label} 
                                            onClick={() => { setDuration(d.val); resetSession(); }}
                                            className={`px-3 md:px-4 py-1.5 md:py-2 rounded-full text-xs md:text-sm transition-all duration-300 ${duration === d.val ? 'bg-accent text-dark font-medium shadow-[0_0_15px_rgba(45,212,191,0.3)]' : 'bg-white/5 text-gray-300 hover:bg-white/10'}`}
                                        >
                                            {d.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="mt-6 flex justify-between items-end border-t border-white/10 pt-4">
                                <div>
                                    <p className="text-[9px] uppercase text-gray-500 tracking-widest mb-1">Remaining Time</p>
                                    <p className="text-2xl md:text-3xl font-serif text-white">{duration === 0 ? '∞' : formatTime(sessionTimeLeft)}</p>
                                </div>
                                <div className="text-right">
                                    <p className="text-[9px] uppercase text-gray-500 tracking-widest mb-1">Cycles Done</p>
                                    <p className="text-2xl md:text-3xl font-serif text-accent">{cyclesCompleted}</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* HERO CIRCLE ANIMATION */}
                    <div className="flex-1 flex flex-col items-center justify-center py-6 md:py-12 relative overflow-hidden">
                        <div className="relative w-64 h-64 sm:w-72 sm:h-72 md:w-96 md:h-96 flex items-center justify-center">
                            
                            {/* Outer Glow Ring */}
                            <div 
                                className="absolute inset-0 rounded-full pulse-ring pointer-events-none"
                                style={{
                                    transform: isRunning ? `scale(${currentStyle.ringScale + 0.1})` : 'scale(0.8)',
                                    opacity: isRunning ? currentStyle.ringOpacity * 0.5 : 0,
                                    background: `radial-gradient(circle, ${currentStyle.color.replace('0.85', '0')} 40%, ${currentStyle.color.replace('0.85', '0.2')} 100%)`,
                                    transitionDuration: `${transitionSecs}s`
                                }}
                            ></div>

                            {/* Inner Pulse Ring */}
                            <div 
                                className="absolute inset-0 rounded-full border border-solid pulse-ring pointer-events-none"
                                style={{
                                    transform: isRunning ? `scale(${currentStyle.ringScale})` : 'scale(0.7)',
                                    opacity: isRunning ? currentStyle.ringOpacity : 0,
                                    borderColor: currentStyle.color.replace('0.85', '0.5'),
                                    transitionDuration: `${transitionSecs}s`
                                }}
                            ></div>

                            {/* Main Hero Circle */}
                            <div 
                                className={`absolute rounded-full flex flex-col items-center justify-center text-white hero-circle w-full h-full ${!isRunning ? 'idle-pulse' : ''}`}
                                style={{
                                    transform: isRunning ? `scale(${currentStyle.scale})` : 'scale(1)',
                                    backgroundColor: isRunning ? currentStyle.color : '',
                                    boxShadow: isRunning ? `0 0 60px ${currentStyle.shadow}` : '',
                                    transitionDuration: isRunning ? `${transitionSecs}s` : '0s',
                                    backdropFilter: isRunning ? 'blur(8px)' : 'none'
                                }}
                            >
                                {isRunning && activeRatio[currentPhase] > 0 && (
                                    <div 
                                        className="text-center transition-opacity duration-300 flex flex-col items-center justify-center"
                                        style={{ transform: `scale(${1 / currentStyle.scale})` }} 
                                    >
                                        <h2 className="font-serif text-3xl md:text-5xl italic tracking-wide mb-1 drop-shadow-md">{currentStyle.label}</h2>
                                        <p className="font-sans text-xl md:text-3xl font-light tracking-wider opacity-90">{phaseTimeLeft}s</p>
                                    </div>
                                )}
                                {!isRunning && !isFinished && (
                                    <div className="text-center opacity-60">
                                        <p className="text-sm tracking-widest uppercase">Ready</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Bottom Controls */}
                    <div className="mt-auto relative z-10 w-full pt-6">
                        {/* Progress Bar */}
                        {duration > 0 && (
                            <div className="w-full bg-white/5 h-1 md:h-1.5 rounded-full overflow-hidden mb-6 md:mb-8 border border-white/5">
                                <div 
                                    className="h-full bg-gradient-to-r from-teal-500 to-accent transition-all duration-1000 ease-linear shadow-[0_0_10px_rgba(45,212,191,0.5)]"
                                    style={{ width: `${progressPercent}%` }}
                                ></div>
                            </div>
                        )}

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 items-center glass-panel p-5 md:p-6 rounded-3xl">
                            
                            {/* Sound Settings */}
                            <div className="flex flex-col gap-4 order-2 md:order-1">
                                <div className="flex items-center justify-between">
                                    <span className="text-[11px] uppercase tracking-widest text-gray-400 font-semibold">Audio Mix</span>
                                    <button 
                                        onClick={() => setSoundEnabled(!soundEnabled)}
                                        className={`w-10 h-5 md:w-12 md:h-6 rounded-full relative transition-colors duration-300 ${soundEnabled ? 'bg-accent' : 'bg-white/20'}`}
                                    >
                                        <div className={`w-3.5 h-3.5 md:w-4 md:h-4 bg-white rounded-full absolute top-[3px] md:top-1 transition-all duration-300 ${soundEnabled ? 'left-[22px] md:left-7' : 'left-1'}`}></div>
                                    </button>
                                </div>
                                <div className={`flex flex-col gap-3 transition-opacity duration-300 ${soundEnabled ? 'opacity-100' : 'opacity-30 pointer-events-none'}`}>
                                    <div className="flex items-center gap-3">
                                        <svg className="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                                        <input type="range" min="0" max="100" value={cueVolume} onChange={(e)=>setCueVolume(e.target.value)} className="flex-1" />
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <svg className="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                                        <input type="range" min="0" max="100" value={ambientVolume} onChange={(e)=>setAmbientVolume(e.target.value)} className="flex-1" />
                                    </div>
                                </div>
                            </div>

                            {/* Play/Pause Central Controls */}
                            <div className="flex items-center justify-center gap-6 order-1 md:order-2 py-4 md:py-0 border-b md:border-b-0 md:border-x border-white/5">
                                <button 
                                    onClick={resetSession}
                                    className="w-12 h-12 rounded-full bg-white/5 border border-white/10 text-gray-400 flex items-center justify-center hover:bg-white/10 hover:text-white transition-all duration-300"
                                    title="Reset"
                                >
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                                </button>
                                
                                <button 
                                    onClick={toggleSession}
                                    className={`w-16 h-16 md:w-20 md:h-20 rounded-full flex items-center justify-center transition-all duration-300 shadow-xl ${isRunning ? 'bg-white/10 text-white border border-white/20' : 'bg-gradient-to-tr from-teal-500 to-accent text-dark shadow-[0_0_30px_rgba(45,212,191,0.4)] hover:shadow-[0_0_40px_rgba(45,212,191,0.6)] hover:scale-105'}`}
                                >
                                    {isRunning ? (
                                        <svg className="w-6 h-6 md:w-8 md:h-8" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd"></path></svg>
                                    ) : (
                                        <svg className="w-8 h-8 md:w-10 md:h-10 ml-1 md:ml-2" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clipRule="evenodd"></path></svg>
                                    )}
                                </button>
                            </div>

                            {/* Right empty spacer for grid balance */}
                            <div className="hidden md:block order-3 text-right">
                                <p className="text-[10px] text-gray-500 uppercase tracking-widest">Status</p>
                                <p className="text-sm text-gray-300 mt-1">{isRunning ? 'Session Active' : 'Ready to begin'}</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AlphaHarmonizer />);
    </script>
</body>
</html>
